<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sudoku Puzzle</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            background-color: #f5f5f5;
        }
        h1 {
            color: #333;
        }
        .sudoku-board {
            display: grid;
            grid-template-columns: repeat(9, 40px);
            grid-template-rows: repeat(9, 40px);
            gap: 1px;
            background-color: #333;
            border: 3px solid #333;
        }
        .cell {
            width: 40px;
            height: 40px;
            text-align: center;
            font-size: 18px;
            background-color: white;
        }
        .cell input {
            width: 100%;
            height: 100%;
            border: none;
            text-align: center;
            font-size: 18px;
            outline: none;
        }
        .cell.thick-right {
            border-right: 3px solid #333;
        }
        .cell.thick-bottom {
            border-bottom: 3px solid #333;
        }
        .fixed {
            background-color: #e0e0e0;
            font-weight: bold;
        }
        .controls {
            margin-top: 20px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            margin: 5px;
        }
        button:hover {
            background-color: #45a049;
        }
        .message {
            margin-top: 15px;
            font-weight: bold;
            color: #333;
        }
    </style>
</head>
<body>
    <h1>Sudoku Puzzle</h1>
    <div class="sudoku-board" id="board"></div>
    <div class="controls">
        <button onclick="checkSolution()">Check Solution</button>
        <button onclick="newGame()">New Game</button>
    </div>
    <div class="message" id="message"></div>

    <script>
        // Easy Sudoku puzzle (0 represents empty cells)
        const puzzle = [
            [5, 3, 0, 0, 7, 0, 0, 0, 0],
            [6, 0, 0, 1, 9, 5, 0, 0, 0],
            [0, 9, 8, 0, 0, 0, 0, 6, 0],
            [8, 0, 0, 0, 6, 0, 0, 0, 3],
            [4, 0, 0, 8, 0, 3, 0, 0, 1],
            [7, 0, 0, 0, 2, 0, 0, 0, 6],
            [0, 6, 0, 0, 0, 0, 2, 8, 0],
            [0, 0, 0, 4, 1, 9, 0, 0, 5],
            [0, 0, 0, 0, 8, 0, 0, 7, 9]
        ];

        // Solution for verification
        const solution = [
            [5, 3, 4, 6, 7, 8, 9, 1, 2],
            [6, 7, 2, 1, 9, 5, 3, 4, 8],
            [1, 9, 8, 3, 4, 2, 5, 6, 7],
            [8, 5, 9, 7, 6, 1, 4, 2, 3],
            [4, 2, 6, 8, 5, 3, 7, 9, 1],
            [7, 1, 3, 9, 2, 4, 8, 5, 6],
            [9, 6, 1, 5, 3, 7, 2, 8, 4],
            [2, 8, 7, 4, 1, 9, 6, 3, 5],
            [3, 4, 5, 2, 8, 6, 1, 7, 9]
        ];

        function createBoard() {
            const board = document.getElementById('board');
            board.innerHTML = '';
            
            for (let i = 0; i < 9; i++) {
                for (let j = 0; j < 9; j++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    
                    if ((j + 1) % 3 === 0 && j !== 8) {
                        cell.classList.add('thick-right');
                    }
                    if ((i + 1) % 3 === 0 && i !== 8) {
                        cell.classList.add('thick-bottom');
                    }
                    
                    if (puzzle[i][j] !== 0) {
                        cell.classList.add('fixed');
                        cell.textContent = puzzle[i][j];
                    } else {
                        const input = document.createElement('input');
                        input.type = 'number';
                        input.min = '1';
                        input.max = '9';
                        input.dataset.row = i;
                        input.dataset.col = j;
                        input.addEventListener('input', function() {
                            this.value = this.value.replace(/[^1-9]/g, '');
                            if (this.value.length > 1) this.value = this.value.slice(-1);
                        });
                        cell.appendChild(input);
                    }
                    
                    board.appendChild(cell);
                }
            }
        }

        function checkSolution() {
            const inputs = document.querySelectorAll('.cell input');
            let isComplete = true;
            let isCorrect = true;
            
            inputs.forEach(input => {
                const row = parseInt(input.dataset.row);
                const col = parseInt(input.dataset.col);
                const value = parseInt(input.value);
                
                if (!input.value) {
                    isComplete = false;
                } else if (value !== solution[row][col]) {
                    isCorrect = false;
                }
            });
            
            const message = document.getElementById('message');
            if (!isComplete) {
                message.textContent = 'Please fill in all cells.';
                message.style.color = '#ff6b6b';
            } else if (isCorrect) {
                message.textContent = 'Congratulations! You solved the puzzle!';
                message.style.color = '#4CAF50';
            } else {
                message.textContent = 'Some numbers are incorrect. Try again!';
                message.style.color = '#ff6b6b';
            }
        }

        function newGame() {
            location.reload();
        }

        createBoard();
    </script>
</body>
</html>
