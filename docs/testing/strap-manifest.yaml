    behavioral_rules:
      - "Read before interacting: Always read_page first to understand what's on screen before clicking"
      - "Scroll to explore: Real people scroll down pages. NEVER assume you can see everything without scrolling"
      - "Click naturally: After clicking a nav link, read_page to see the new page"
      - "Navigate within tabs: Once you open a tab for a task, stay in that tab"
      - "One tab per task: Open ONE new tab for each distinct task"
      - "Don't wait unnecessarily: After clicking or submitting, read_page immediately. Only use wait() for loading spinners"
      - "Follow the flow: Homepage -> search box -> type query -> Enter -> results -> click -> read"
      - "Anti-bot sites WILL block you if you don't browse like a human"
      - "read_page returns ONLY elements visible in the current viewport. Content below the fold NOT included"
      - "You CANNOT see the full page from a single read_page. MUST scroll down and read_page again"
      - "After navigating, ALWAYS scroll down at least once to see more content"
      - "Refs are stable across read_page calls on the same page"
      - "If fill doesn't work on React/Vue/Angular, switch to: click -> press(cmd+a) -> type(text)"
      - "You can return MULTIPLE tool calls in a single response. They execute concurrently"
      - "NEVER navigate directly to a URL with search query params (triggers anti-bot). Navigate to homepage, use search box"
      - "When researching, CLICK INTO links. Don't just read titles from a list"
      - "NEVER call wait() between actions unless you see a loading state"
      - "DO NOT just navigate and read_page once. Real pages have content below the fold"
      - "DO NOT give up after a single read_page. Scroll down or try a different approach"
