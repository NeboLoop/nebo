# =============================================================================

registration:
  always_on:
    - { tool: web, condition: 'allowed("web")', docs: always-injected }
    - { tool: agent, condition: always, docs: deferred (STRAP_DEFERRED_DOCS) }
    - { tool: event, condition: always, docs: deferred (STRAP_DEFERRED_DOCS) }
    - { tool: skill, condition: always, docs: deferred (STRAP_DEFERRED_DOCS) }
    - { tool: message, condition: always, docs: deferred (STRAP_DEFERRED_DOCS) }
    - { tool: agents, condition: always, docs: always-injected }
    - { tool: plugin, condition: "plugin_store exists AND installed plugins", docs: deferred (STRAP_DEFERRED_DOCS) }
    - { tool: loop, condition: 'allowed("loop") AND comm_plugin', docs: always-injected }

  always_on_no_deferred_doc:
    - { tool: emit, condition: always, docs: always-injected }

  deferred_registration:
    - { tool: os, condition: always, activated_by: keyword }
    - { tool: execute, condition: "skill_loader AND plan_tier", activated_by: keyword }
    - { tool: work, condition: workflow_manager, activated_by: keyword }
