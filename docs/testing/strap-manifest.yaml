    - { tool: vm, condition: always }

  deferred_doc_tools: [agent, skill, event, message, plugin]

# =============================================================================
# DISCREPANCIES
# =============================================================================

discrepancies:
  - id: identical-os-docs
    status: FIXED
    description: "os_macos.txt and os_linux.txt were byte-for-byte identical"
    fix: "os_linux.txt rewritten with Linux-specific guidance: bash shell, apt/dnf/pacman, systemctl, XDG paths, no osascript"

  - id: windows-missing-snapshot-rule
    status: FIXED
    description: "desktop_windows.txt omitted the snapshot chaining behavioral rule"
    fix: "Added snapshot chaining rule matching desktop_macos.txt"

  - id: vm-no-strap-doc
    status: FIXED
    description: "vm tool had no STRAP doc"
    fix: "Created strap/vm.txt, added STRAP_VM constant and strap_tool_doc('vm') match arm"

  - id: publisher-no-strap-doc
    status: FIXED
    description: "publisher tool had no STRAP doc"
    fix: "Created strap/publisher.txt, added STRAP_PUBLISHER constant and strap_tool_doc('publisher') match arm"

  - id: emit-no-strap-doc
    status: FIXED
    description: "emit tool had no STRAP doc despite being registered globally and keyword-activated"
    fix: "Created strap/emit.txt, added STRAP_EMIT constant and strap_tool_doc('emit') match arm"

  - id: schedule-keyword-overlap
    status: INTENTIONAL
    description: "'schedule' appears in both event and organizer keyword groups"
    rationale: >
      event tool handles agent-executed tasks (cron, timers). organizer handles
      human-facing calendar entries. 'schedule a meeting' needs organizer.
      'schedule a daily check' needs event. Dual activation costs ~1,164 extra
      tokens but prevents first-call misses on ambiguous intent. The model
      needs both docs to pick correctly.

  - id: web-search-vs-strap-search
    status: BY_DESIGN
    description: "web.txt documents search as a top-level action, but tool_filter groups it under web keyword group alongside browse/http"
    rationale: "Consistent activation — search is one capability within the web tool"

  - id: tool-search-invisible
    status: BY_DESIGN
    description: "tool_search is in ALWAYS_INCLUDE_TOOLS but has no STRAP doc"
    rationale: "Meta-tool for deferred discovery — schema alone is sufficient"

  - id: capture-action-alias
    status: FIXED
    description: >
      Manifest documents the capture resource action 'capture', but the runtime
      handle_capture accepted only 'screenshot'/'see', so os(resource: capture,
      action: capture) returned 'Unknown capture action'.
    fix: "crates/tools/src/desktop_tool.rs aliases 'capture' => screenshot; manifest and runtime are now consistent (see comm_session_behaviors: desktop-capture-action-name)."
