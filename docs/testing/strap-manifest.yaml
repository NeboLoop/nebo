        actions:
          fetch:
            params:
              url: { type: string, required: true }
              method: { type: string, required: false }
              body: { type: string, required: false }
              headers: { type: object, required: false }
              offset: { type: int, required: false }
          get:
            params:
              url: { type: string, required: true }
          post:
            params:
              url: { type: string, required: true }
              body: { type: string, required: false }
          put:
            params:
              url: { type: string, required: true }
              body: { type: string, required: false }
          delete:
            params:
              url: { type: string, required: true }
          head:
            params:
              url: { type: string, required: true }
          sanitize:
            params:
              url: { type: string, required: true }
              chunk_size: { type: int, required: false }
              offset: { type: int, required: false }
      search:
        actions:
          search:
            params:
              query: { type: string, required: true }
      browser:
        actions:
          navigate:
            params:
              url: { type: string, required: true }
          read_page:
            params:
              filter: { type: string, required: false, values: ["interactive"] }
              depth: { type: int, required: false, default: 15 }
              refId: { type: string, required: false }
              maxChars: { type: int, required: false }
          click:
            params:
              ref: { type: string, required: false }
              coordinate: { type: "array[int,int]", required: false }
              selector: { type: string, required: false }
              modifiers: { type: string, required: false }
            note: "One of ref/coordinate/selector required"
          double_click:
            params:
              ref: { type: string, required: true }
          triple_click:
            params:
              ref: { type: string, required: true }
          right_click:
            params:
              ref: { type: string, required: true }
          hover:
            params:
              ref: { type: string, required: true }
          fill:
            params:
              ref: { type: string, required: true }
              value: { type: string, required: true }
          type:
            params:
              text: { type: string, required: true }
          select:
            params:
              ref: { type: string, required: true }
              value: { type: string, required: true }
          screenshot:
            params: {}
          scroll:
            params:
              direction: { type: string, required: true, values: [up, down, left, right] }
