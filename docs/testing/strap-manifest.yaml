    event:
      activates: event (tool)
      keywords: [event, schedule, remind, alarm, timer, "in 10 minutes", "every day", cron, recurring, later, tomorrow, "next week", "at 5pm", "in an hour", daily, weekly, monthly]
    loop:
      activates: loop (tool)
      keywords: [neboai, channel, dm, "direct message", "group chat", topic, broadcast, "send to"]
    work:
      activates: work (tool)
      keywords: [workflow, automate, automation, procedure, "run workflow"]
    execute:
      activates: execute (tool)
      keywords: ["run script", "execute script", python, node, javascript, "run code", "execute code"]
    emit:
      activates: emit (tool)
      keywords: ["emit event", "fire event", "trigger event"]
    desktop:
      activates: os sub-context
      keywords: [click, mouse, keyboard, window, screenshot, screen, capture, visible, "see what", gui, menu, dialog, accessibility, drag, scroll, "type in", hotkey, tts, speak, "say aloud", dock, "virtual desktop"]
    app:
      activates: os sub-context
      keywords: [launch, "open app", "close app", "running app", activate, frontmost, "switch to", "quit app", "start app", "which app"]
    organizer:
      activates: os sub-context
      keywords: [calendar, reminder, contact, email, schedule, appointment, mail, inbox, unread, invite, invitation, rsvp]
    music:
      activates: os sub-context
      keywords: [music, play, pause, song, playlist, track, album, shuffle, "next song", spotify, "now playing", "what's playing"]
    settings:
      activates: os sub-context
      keywords: [volume, brightness, wifi, bluetooth, "dark mode", mute, unmute, sleep, "lock screen", battery, "system info"]
    keychain:
      activates: os sub-context
      keywords: [password, credential, keychain, secret, "api key", token, login, "stored password"]
    spotlight:
      activates: os sub-context
      keywords: ["find file", "search file", locate, spotlight, "search for file", "where is the file", mdfind]

  always_include_tools: [agent, skill, event, message, tool_search, plugin]

  special_rules:
    - "'schedule' keyword appears in BOTH event and organizer groups — activates both contexts simultaneously"
    - "mcp__ prefixed tools always pass through filter (prefix match)"
    - "Agent sidecar tools always pass through filter (checked against agent_tool_names)"
    - "Any tool already called this session is kept active permanently (called_set)"
    - "Keyword scan window: last 5 user+assistant messages only"
    - "If os appears in called_tools, ALL os sub-contexts activate"

  deferred_tool_discovery:
    - "Model history scanned for: (1) assistant tool_calls where name is in deferred_names, (2) tool role messages matching tool_search results"
    - "Fallback: content containing both 'total_deferred' and 'matches' strings"
    - "Tools naturally unload when discovery messages slide out of context window"

