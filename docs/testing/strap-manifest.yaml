# STRAP Doc Manifest — Prompt Component Inventory
#
# Source of truth for the test harness. Every resource/action pair is a fixture
# target, every behavioral rule is an assertion, every keyword activation path
# needs a regression test, every tool correction is a known LLM failure mode.
#
# Generated from: crates/agent/src/strap/*.txt, tool_filter.rs, prompt.rs, registry.rs
# Total STRAP docs: 26 files, 51,903 bytes (~12,975 tokens)

# =============================================================================
# STRAP DOCS — Core Tools
# =============================================================================

strap_docs:

  # ---------------------------------------------------------------------------
  # OS / System — the meta-tool (platform-conditional)
  # ---------------------------------------------------------------------------
  os_macos:
    file: crates/agent/src/strap/os_macos.txt
    platform: macos
    char_count: 1778
    token_estimate: 444
    activation: deferred-registration
    activation_detail: >
      os tool is register_deferred — activated when keyword scan matches any
      os-related context (desktop, app, music, settings, keychain, spotlight,
      organizer) OR when the tool has been called in the session.
    tool_names: [os, system]
    behavioral_rules:
      - "Prefer file actions over shell commands: file read NOT shell cat, file grep NOT shell grep, file glob NOT shell find"
    resources:
      file:
        actions:
          read:
            params:
              path: { type: string, required: true }
            example: 'os(resource: "file", action: "read", path: "/path/to/file")'
          write:
            params:
              path: { type: string, required: true }
              content: { type: string, required: true }
            example: 'os(resource: "file", action: "write", path: "/path", content: "...")'
          edit:
            params:
              path: { type: string, required: true }
              old_string: { type: string, required: true }
              new_string: { type: string, required: true }
            example: 'os(resource: "file", action: "edit", path: "/path", old_string: "old", new_string: "new")'
          glob:
            params:
              pattern: { type: string, required: true }
              path: { type: string, required: true }
            example: 'os(resource: "file", action: "glob", pattern: "**/*.rs", path: "/project")'
          grep:
            params:
              regex: { type: string, required: true }
              path: { type: string, required: true }
              output_mode: { type: string, required: false, values: ["files"] }
              context_before: { type: int, required: false }
              context_after: { type: int, required: false }
            example: 'os(resource: "file", action: "grep", regex: "TODO", path: "/project")'
      shell:
        actions:
          exec:
            params:
              command: { type: string, required: true }
              background: { type: bool, required: false }
            example: 'os(resource: "shell", action: "exec", command: "ls -la")'
          list:
            params: {}
          kill:
            params:
              pid: { type: int, required: true }
          info:
            params:
              pid: { type: int, required: true }
          poll:
            params:
              session_id: { type: string, required: true }
          log:
            params:
              session_id: { type: string, required: true }
          write:
            params:
              session_id: { type: string, required: true }
              input: { type: string, required: true }
          status:
            params: {}

