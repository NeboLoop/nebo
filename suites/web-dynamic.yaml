name: "Dynamic Site Research"
description: |
  Real-world browser-based research workflows on dynamic sites with forms,
  autocomplete, and structured results. These are the workflows Nebo's
  target users (realtors, consultants, small business owners) actually do:
  government database searches, competitor research, property lookups,
  flight pricing, and market analysis.

