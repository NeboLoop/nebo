# Nebo Model Configuration
# This file defines available AI models and their settings.
# API keys are stored securely in the database, not here.
#
# To add API keys: Settings > Providers in the web UI
#
# Provider Types:
#   - API providers: Require API keys, direct API calls
#   - CLI providers: Use installed CLI tools (claude, codex, gemini)
#     No API keys needed - uses your existing account auth
#
# CLI providers are auto-detected based on installed tools.
# To install: brew install claude-code, npm i -g @openai/codex, npm i -g @google/gemini-cli
#
# Updated: April 2026 - Latest model IDs from official docs

version: "1.0"

# Provider credentials (use environment variables or UI)
credentials:
  anthropic:
    api_key: ${ANTHROPIC_API_KEY}
  openai:
    api_key: ${OPENAI_API_KEY}
  google:
    api_key: ${GOOGLE_API_KEY}
  deepseek:
    api_key: ${DEEPSEEK_API_KEY}

# Model selection defaults
defaults:
  # Primary provider/model (used first)
  # Format: "provider/model" or just "provider" (uses provider's default)
  primary: anthropic/claude-sonnet-4-6

  # Fallback chain (tried in order if primary fails)
  fallbacks:
    - anthropic/claude-haiku-4-5-20251001

# Task-based model routing
# Automatically selects the best model based on the task type
task_routing:
  vision: anthropic/claude-sonnet-4-6
  audio: openai/gpt-5.4
  reasoning: anthropic/claude-opus-4-6
  code: anthropic/claude-sonnet-4-6
  general: anthropic/claude-sonnet-4-6
  fallbacks:
    vision:
      - anthropic/claude-opus-4-6
      - openai/gpt-5.4
    reasoning:
      - openai/gpt-5.4
      - anthropic/claude-sonnet-4-6
    code:
      - anthropic/claude-opus-4-6
      - openai/gpt-5.4
      - openai/codex-mini-latest
    general:
      - anthropic/claude-haiku-4-5-20251001
      - openai/gpt-5.4-nano

# Available models by provider
providers:
  anthropic:
    - id: claude-opus-4-6
      displayName: Claude Opus 4.6
      contextWindow: 1000000
      capabilities: [vision, tools, streaming, code, reasoning, thinking]
      pricing:
        input: 5.0
        output: 25.0
        cachedInput: 0.50
      active: false
    - id: claude-sonnet-4-6
      displayName: Claude Sonnet 4.6
      contextWindow: 1000000
      capabilities: [vision, tools, streaming, code, thinking]
      pricing:
        input: 3.0
        output: 15.0
        cachedInput: 0.30
      active: false
    - id: claude-haiku-4-5-20251001
      displayName: Claude Haiku 4.5
      contextWindow: 200000
      capabilities: [vision, tools, streaming, code]
      pricing:
        input: 1.0
        output: 5.0
        cachedInput: 0.10
      active: false

  openai:
    - id: gpt-5.4
      displayName: GPT-5.4
      contextWindow: 400000
      capabilities: [vision, tools, streaming, code, reasoning]
      active: false
    - id: gpt-5.4-mini
      displayName: GPT-5.4 Mini
      contextWindow: 400000
      capabilities: [vision, tools, streaming, code, reasoning]
      active: false
    - id: gpt-5.4-nano
      displayName: GPT-5.4 Nano
      contextWindow: 128000
      capabilities: [vision, tools, streaming, code]
      active: false
    - id: codex-mini-latest
      displayName: Codex
      contextWindow: 256000
      capabilities: [tools, streaming, code, reasoning]
      active: false

  google:
    - id: gemini-3.1-pro-preview
      displayName: Gemini 3.1 Pro
      contextWindow: 1000000
      capabilities: [vision, tools, streaming, code, reasoning, thinking]
      pricing:
        input: 1.25
        output: 5.00
      active: false
    - id: gemini-3-flash-preview
      displayName: Gemini 3 Flash
      contextWindow: 1000000
      capabilities: [vision, tools, streaming, code]
      pricing:
        input: 0.10
        output: 0.40
      active: false
    - id: gemini-2.5-flash
      displayName: Gemini 2.5 Flash
      contextWindow: 1000000
      capabilities: [vision, tools, streaming, code]
      pricing:
        input: 0.15
        output: 0.60
      active: false

  deepseek:
    - id: deepseek-chat
      displayName: DeepSeek Chat
      contextWindow: 128000
      capabilities: [tools, streaming, code]
      active: false
    - id: deepseek-reasoner
      displayName: DeepSeek Reasoner
      contextWindow: 128000
      capabilities: [reasoning, code]
      active: false

  janus:
    - id: nebo-1
      displayName: Nebo 1
      contextWindow: 200000
      capabilities: [vision, tools, streaming, code, reasoning]
      active: true
    - id: nebo-embed-small
      displayName: Nebo Embeddings (Small)
      contextWindow: 8191
      capabilities: [embeddings]
      active: true
    - id: nebo-embed-large
      displayName: Nebo Embeddings (Large)
      contextWindow: 8191
      capabilities: [embeddings]
      active: true

  # Ollama models are auto-discovered at runtime — do not list them here.
  # Users activate models via Settings > Providers after installing Ollama.

# ============================================
# CLI PROVIDERS (no API key required)
# ============================================
# These use locally installed CLI tools.
# Auto-detected: if the command exists in PATH, it's available.
# Auth: Uses your existing account (Claude subscription, ChatGPT, Google)

cli_providers:
  - id: claude-code
    displayName: Claude Agent
    command: claude
    installHint: brew install claude-code
    models: [opus, sonnet, haiku]
    defaultModel: opus
    active: false
  - id: codex-cli
    displayName: OpenAI Codex CLI
    command: codex
    installHint: npm i -g @openai/codex
    models: [gpt-5.4, gpt-5.4-mini, codex-mini-latest]
    defaultModel: gpt-5.4
    active: false
  - id: gemini-cli
    displayName: Gemini CLI
    command: gemini
    installHint: npm i -g @google/gemini-cli
    models: [gemini-3-flash-preview, gemini-3.1-pro-preview]
    defaultModel: gemini-3.1-pro-preview
    active: false
