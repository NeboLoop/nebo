Name: nebo
Host: 127.0.0.1
Port: 27895
Timeout: 60000 # 60 seconds for API testing

# App settings (from .env, defaults to localhost)
App:
  BaseURL: ${APP_BASE_URL:-http://localhost:27895}
  Domain: ${APP_DOMAIN:-localhost}

# Logging - configurable via Level: debug, info, error, severe
Log:
  Mode: console
  Encoding: plain
  Level: info # info = important events, debug = verbose, error = errors only
  Stat: false # Disable stat logs

# Auth settings are overridden by local settings (~/.nebo/settings.json)
# These are just placeholders to satisfy the config parser
Auth:
  AccessSecret: placeholder-replaced-at-runtime
  AccessExpire: 31536000
  RefreshTokenExpire: 31536000

# Database uses ~/.nebo/data/nebo.db by default (shared with agent)
Database: {}

# Agent runtime limits
# MaxConcurrentRuns caps in-flight LLM calls across all agents.
# 0 = auto (scales from available memory/load, up to 100).
# Override at runtime via env var: NEBO_MAX_CONCURRENT_RUNS
Runtime:
  MaxConcurrentRuns: 0

# NeboAI integration (managed services)
# Enables: Loops (social trust circles), Marketplace, Gateway plugins
# Override any URL via env var: NEBOAI_API_URL, NEBOAI_JANUS_URL, NEBOAI_COMMS_URL
NeboAI:
  Enabled: true
  ApiURL: https://api.neboai.com
  JanusURL: https://janus.neboai.com
  CommsURL: wss://comms.neboai.com/ws
