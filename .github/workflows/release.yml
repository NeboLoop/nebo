name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

env:
  RUST_VERSION: "1.95"
  NODE_VERSION: "22"
  # Obscura tier-2 browser ships as a Tauri externalBin sidecar (NOT a marketplace
  # .napp). It is BUILT FROM OUR FORK in CI on each platform's runner (upstream lacks
  # the CDP fixes new_page needs), so no pre-published per-platform assets are required.
  # Pin OBSCURA_REF to a tag for reproducibility once cut; a branch is fine meanwhile.
  OBSCURA_FORK: "https://github.com/localrivet/obscura"
  OBSCURA_REF: "chromiumoxide-cdp-compat"

jobs:
  # ─── Build frontend (shared by all platform builds) ───────────────────
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        run: npm install -g pnpm@10.33.2

      - name: Build frontend
        run: |
          cd app
          pnpm install --frozen-lockfile
          pnpm exec svelte-kit sync
          pnpm run build

      - name: Upload frontend build
        uses: actions/cache/save@v4
        with:
          key: frontend-build-${{ github.sha }}
          path: app/build/

  # ─── macOS desktop builds (Tauri 2) ───────────────────────────────────
  # Both archs build on `macos-latest` (arm64 host). The x86_64 build is
  # cross-compiled via `--target=x86_64-apple-darwin` plus the per-arch
  # env block below. We used to run amd64 on `macos-13` but that runner
  # pool is severely starved (3+ hour queues) since Apple Silicon
  # migration, so we switched to cross-build.
  build-macos:
    needs: frontend
    # macOS runners bill at ~10x Linux. By default the macOS assets are built
    # LOCALLY (`make release-macos && make publish-macos TAG=vX.Y.Z`) and this
    # job is skipped. Set repo variable BUILD_MACOS_IN_CI=true to build in CI.
    if: ${{ vars.BUILD_MACOS_IN_CI == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            arch: arm64
            osx_arch: arm64
    runs-on: macos-latest
    env:
      HAS_SIGNING_CERT: ${{ secrets.APPLE_CERTIFICATE_P12 != '' && 'true' || 'false' }}
      HAS_CDN_URL: ${{ secrets.NEBOAI_CDN_URL != '' && 'true' || 'false' }}
      RUSTC_WRAPPER: ""
      # NOTE: CMAKE_OSX_ARCHITECTURES, CFLAGS, CXXFLAGS for cross-build are
      # set ONLY on the "Build Tauri desktop app" step below — not at job
      # scope — so host-arch tools like `cargo install tauri-cli` link
      # for arm64 (the host) rather than the matrix's target arch.
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: brew install protobuf

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: ${{ matrix.target }}

      - name: Ensure target is installed
        run: rustup target add ${{ matrix.target }}

      # Cache the Rust dependency build so re-runs (and every release) don't
      # recompile the whole dep tree from scratch — the bulk of the ~hour.
      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
          cache-on-failure: true

      - name: Download frontend build
        uses: actions/cache/restore@v4
        with:
          key: frontend-build-${{ github.sha }}
          path: app/build/
          fail-on-cache-miss: true

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Import signing certificate
        if: ${{ env.HAS_SIGNING_CERT == 'true' }}
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain-db
          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          echo "$APPLE_CERTIFICATE_P12" | base64 --decode > $RUNNER_TEMP/cert.p12
          security import $RUNNER_TEMP/cert.p12 -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          rm $RUNNER_TEMP/cert.p12
          security set-key-partition-list -S apple-tool:,apple: -s -k "" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain

      - name: Prepare bundled .napp files
        if: ${{ env.HAS_CDN_URL == 'true' }}
        env:
          NEBOAI_CDN_URL: ${{ secrets.NEBOAI_CDN_URL }}
        run: |
          mkdir -p src-tauri/bundled-napps/{skills,agents,plugins}
          # Download platform-specific plugin .napp files
          PLATFORM="${{ matrix.arch == 'arm64' && 'darwin-arm64' || 'darwin-amd64' }}"
          echo "Downloading bundled .napp files for $PLATFORM..."
          # Skills and agents are platform-agnostic
          for type in skills agents; do
            if [ -f "src-tauri/bundled-napps/${type}/.manifest" ]; then
              while read -r url; do
                curl -sSfL -o "src-tauri/bundled-napps/${type}/$(basename "$url")" "$url" || true
              done < "src-tauri/bundled-napps/${type}/.manifest"
            fi
          done
          # Plugins are platform-specific
          if [ -f "src-tauri/bundled-napps/plugins/.manifest" ]; then
            while read -r slug; do
              url="${NEBOAI_CDN_URL}/plugins/${slug}/${PLATFORM}.napp"
              curl -sSfL -o "src-tauri/bundled-napps/plugins/${slug}.napp" "$url" || echo "  SKIP $slug (not available for $PLATFORM)"
            done < "src-tauri/bundled-napps/plugins/.manifest"
          fi
          echo "Bundled .napp files:"
          find src-tauri/bundled-napps -name "*.napp" -type f | sort

      - name: Build & stage Obscura sidecars (from fork)
        run: |
          TRIPLE="${{ matrix.target }}"
          git clone --depth 1 --branch "$OBSCURA_REF" "$OBSCURA_FORK" obscura-src
          ( cd obscura-src && cargo build --release -p obscura-cli )
          mkdir -p src-tauri/binaries
          for bin in obscura obscura-worker; do
            cp "obscura-src/target/release/${bin}" "src-tauri/binaries/${bin}-${TRIPLE}"
            chmod +x "src-tauri/binaries/${bin}-${TRIPLE}"
          done
          ls -la src-tauri/binaries

      - name: Build Tauri desktop app
        env:
          # We rely on cc-rs and cmake-rs to derive `-arch` and
          # `CMAKE_OSX_ARCHITECTURES` from the cargo target (set per
          # `--target` below). Don't set global CFLAGS / CXXFLAGS /
          # CMAKE_OSX_ARCHITECTURES — those propagate into BOTH host
          # builds (build scripts, proc macros) and target builds,
          # producing x86_64 objects in a host rlib that the arm64
          # build-script link then rejects.
          MACOSX_DEPLOYMENT_TARGET: "11.0"
        run: cargo tauri build --target ${{ matrix.target }}

      - name: Re-sign .app with Developer ID
        if: ${{ env.HAS_SIGNING_CERT == 'true' }}
        env:
          SIGN_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          APP_PATH="target/${{ matrix.target }}/release/bundle/macos/Nebo.app"

          # Sign embedded frameworks/dylibs first (inside-out signing)
          find "$APP_PATH/Contents/Frameworks" -type f -perm +111 -o -name "*.dylib" 2>/dev/null | while read f; do
            codesign --force --sign "$SIGN_IDENTITY" --timestamp --options runtime "$f"
          done

          # Sign the bundled Obscura sidecars BEFORE the main executable (inside-out).
          # `cargo tauri build` leaves them adhoc/linker-signed (no identity is passed
          # at build time), which passes `codesign --verify` but is REJECTED by
          # notarization — nested Mach-O executables must be Developer-ID-signed with
          # the Hardened Runtime. They embed V8 (deno_core) JIT, so they need the
          # obscura.entitlements (allow-jit / allow-unsigned-executable-memory).
          for sidecar in obscura obscura-worker; do
            SIDECAR_PATH="$APP_PATH/Contents/MacOS/$sidecar"
            if [ -f "$SIDECAR_PATH" ]; then
              codesign --force --sign "$SIGN_IDENTITY" \
                --entitlements assets/macos/obscura.entitlements \
                --timestamp \
                --options runtime \
                "$SIDECAR_PATH"
            fi
          done

          # Sign the main executable explicitly
          codesign --force --sign "$SIGN_IDENTITY" \
            --identifier dev.neboai.nebo \
            --entitlements assets/macos/nebo.entitlements \
            --timestamp \
            --options runtime \
            "$APP_PATH/Contents/MacOS/nebo"

          # Sign the .app bundle
          codesign --force --sign "$SIGN_IDENTITY" \
            --identifier dev.neboai.nebo \
            --entitlements assets/macos/nebo.entitlements \
            --timestamp \
            --options runtime \
            "$APP_PATH"

          codesign --verify --deep --strict "$APP_PATH"
          echo "Nebo.app signed with Developer ID"

      - name: Extract signed binary for auto-update
        run: |
          APP_PATH="target/${{ matrix.target }}/release/bundle/macos/Nebo.app"
          cp "$APP_PATH/Contents/MacOS/nebo" nebo-darwin-${{ matrix.arch }}

      - uses: actions/cache/save@v4
        with:
          key: release-${{ github.run_id }}-nebo-darwin-${{ matrix.arch }}-binary
          path: nebo-darwin-${{ matrix.arch }}

      - name: Create .dmg from signed .app
        id: dmg
        run: |
          APP_PATH="target/${{ matrix.target }}/release/bundle/macos/Nebo.app"
          if [ -d "$APP_PATH" ]; then
            mkdir -p dist
            PKG_VERSION="${{ github.ref_name }}"
            PKG_VERSION="${PKG_VERSION#v}"
            DEST="dist/Nebo-${PKG_VERSION}-${{ matrix.arch }}.dmg"
            # Stage .app in a temp folder for create-dmg
            STAGE=$(mktemp -d)
            cp -R "$APP_PATH" "$STAGE/Nebo.app"
            # Install create-dmg for drag-to-Applications layout
            brew install create-dmg
            create-dmg \
              --volname "Nebo" \
              --window-pos 200 120 \
              --window-size 600 400 \
              --icon-size 100 \
              --icon "Nebo.app" 175 190 \
              --hide-extension "Nebo.app" \
              --app-drop-link 425 190 \
              "$DEST" \
              "$STAGE"
            rm -rf "$STAGE"
            echo "dmg_path=$DEST" >> "$GITHUB_OUTPUT"
          fi

      # Hand the signed (not-yet-notarized) DMG to the separate notarize-macos
      # job. Notarization is split out so a notarization failure — mandatory, and
      # the most likely failure — re-runs in minutes against this artifact instead
      # of rebuilding the whole app.
      - uses: actions/cache/save@v4
        if: ${{ steps.dmg.outputs.dmg_path != '' }}
        with:
          key: release-${{ github.run_id }}-nebo-darwin-${{ matrix.arch }}-dmg-signed
          path: dist/

  # ─── Notarize macOS DMG (separate job, cheap to re-run) ──────────────
  # Notarization is MANDATORY but split from the build: a notarization failure
  # (rejected, agreement renewal, network/notary outage) re-runs in ~3 min
  # against the already-built+signed DMG instead of forcing a full rebuild.
  # If it doesn't return "Accepted" + staple cleanly, this job fails and the
  # release job (gated on success()) publishes nothing — un-notarized never ships.
  notarize-macos:
    needs: build-macos
    if: ${{ vars.BUILD_MACOS_IN_CI == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
    runs-on: macos-latest
    env:
      HAS_NOTARIZE_CREDS: ${{ secrets.APPLE_ID != '' && 'true' || 'false' }}
    steps:
      - name: Restore signed DMG
        uses: actions/cache/restore@v4
        with:
          key: release-${{ github.run_id }}-nebo-darwin-${{ matrix.arch }}-dmg-signed
          path: dist/
          fail-on-cache-miss: true

      - name: Notarize + staple
        if: ${{ env.HAS_NOTARIZE_CREDS == 'true' }}
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          DMG_FILE=$(ls dist/Nebo-*.dmg 2>/dev/null | head -n1)
          if [ -z "$DMG_FILE" ]; then
            echo "::error::no signed DMG found from build-macos"
            exit 1
          fi
          echo "Submitting $DMG_FILE for notarization..."
          # Capture output without aborting (default shell is `bash -eo pipefail`)
          # so we can print the result + fetch the detailed log before deciding.
          set +e
          SUBMIT_OUT=$(xcrun notarytool submit "$DMG_FILE" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait 2>&1)
          set -e
          echo "$SUBMIT_OUT"
          SUB_ID=$(echo "$SUBMIT_OUT" | grep -m1 "id:" | awk '{print $2}')
          if [ -n "$SUB_ID" ]; then
            echo "--- notarization log ($SUB_ID) ---"
            xcrun notarytool log "$SUB_ID" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_APP_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" 2>&1 || true
          fi
          # Only an explicit "Accepted" verdict may proceed.
          if ! echo "$SUBMIT_OUT" | grep -q "status: Accepted"; then
            echo "::error::Notarization did NOT succeed — refusing to ship an un-notarized build."
            exit 1
          fi
          xcrun stapler staple "$DMG_FILE"
          xcrun stapler validate "$DMG_FILE"
          echo "Notarization complete and stapled."

      - name: Save notarized DMG for the release job
        uses: actions/cache/save@v4
        with:
          key: release-${{ github.run_id }}-nebo-darwin-${{ matrix.arch }}-dmg
          path: dist/

  # ─── Linux desktop builds (Tauri 2 — WebKitGTK) ──────────────────────
  build-linux:
    needs: frontend
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            arch: amd64
          # ponytail: arm64-linux disabled — the ubuntu-24.04-arm runner OOMs/stalls
          # on the heavy release Tauri build (blocks the whole release). Re-enable when
          # someone needs Linux ARM64 desktop builds and the runner can take it.
          # - runner: ubuntu-24.04-arm
          #   arch: arm64
    runs-on: ${{ matrix.runner }}
    env:
      HAS_CDN_URL: ${{ secrets.NEBOAI_CDN_URL != '' && 'true' || 'false' }}
      RUSTC_WRAPPER: ""
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.arch }}
          cache-on-failure: true

      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libappindicator3-dev \
            librsvg2-dev \
            pkg-config \
            build-essential \
            protobuf-compiler \
            libopenblas-dev \
            libfuse2

      - name: Configure OpenBLAS paths
        run: |
          MULTIARCH=$(dpkg-architecture -qDEB_HOST_MULTIARCH)
          echo "PKG_CONFIG_PATH=/usr/lib/${MULTIARCH}/pkgconfig" >> $GITHUB_ENV
          # `-l openblas` is REQUIRED — turbovec's `cblas_sgemm` reference
          # otherwise goes unresolved at link time. `--no-as-needed` forces
          # the lib to stay in the link line regardless of placement; we
          # flip back to `--as-needed` afterward so unrelated libs still
          # get pruned. Tested on arm64 + amd64.
          echo "RUSTFLAGS=-C link-arg=-L/usr/lib/${MULTIARCH} -C link-arg=-Wl,--no-as-needed -C link-arg=-lopenblas -C link-arg=-Wl,--as-needed" >> $GITHUB_ENV

      - name: Download frontend build
        uses: actions/cache/restore@v4
        with:
          key: frontend-build-${{ github.sha }}
          path: app/build/
          fail-on-cache-miss: true

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Prepare bundled .napp files
        if: ${{ env.HAS_CDN_URL == 'true' }}
        env:
          NEBOAI_CDN_URL: ${{ secrets.NEBOAI_CDN_URL }}
        run: |
          mkdir -p src-tauri/bundled-napps/{skills,agents,plugins}
          PLATFORM="linux-${{ matrix.arch }}"
          echo "Downloading bundled .napp files for $PLATFORM..."
          if [ -f "src-tauri/bundled-napps/plugins/.manifest" ]; then
            while read -r slug; do
              url="${NEBOAI_CDN_URL}/plugins/${slug}/${PLATFORM}.napp"
              curl -sSfL -o "src-tauri/bundled-napps/plugins/${slug}.napp" "$url" || echo "  SKIP $slug"
            done < "src-tauri/bundled-napps/plugins/.manifest"
          fi

      - name: Build & stage Obscura sidecars (from fork)
        run: |
          TRIPLE="$(rustc -vV | sed -n 's/^host: //p')"
          git clone --depth 1 --branch "$OBSCURA_REF" "$OBSCURA_FORK" obscura-src
          ( cd obscura-src && cargo build --release -p obscura-cli )
          mkdir -p src-tauri/binaries
          for bin in obscura obscura-worker; do
            cp "obscura-src/target/release/${bin}" "src-tauri/binaries/${bin}-${TRIPLE}"
            chmod +x "src-tauri/binaries/${bin}-${TRIPLE}"
          done
          ls -la src-tauri/binaries

      - name: Build Tauri desktop app
        # APPIMAGE_EXTRACT_AND_RUN lets the bundler's linuxdeploy/appimagetool run
        # without a working FUSE mount on the runner; NO_STRIP avoids strip failures
        # inside the AppDir. `bundle.targets: "all"` already emits both .deb and AppImage.
        env:
          APPIMAGE_EXTRACT_AND_RUN: 1
          NO_STRIP: true
        run: cargo tauri build

      - name: Extract desktop binary
        run: |
          cp target/release/nebo nebo-linux-${{ matrix.arch }}

      - name: Build headless CLI binary
        run: cargo build --release -p nebo-cli

      - name: Extract headless binary
        run: cp target/release/nebo-cli nebo-linux-${{ matrix.arch }}-headless

      - name: Stage release artifacts
        run: |
          mkdir -p release-artifacts
          cp nebo-linux-${{ matrix.arch }} release-artifacts/
          cp nebo-linux-${{ matrix.arch }}-headless release-artifacts/
          PKG_VERSION="${{ github.ref_name }}"
          PKG_VERSION="${PKG_VERSION#v}"
          DEB=$(ls target/release/bundle/deb/*.deb 2>/dev/null || true)
          if [ -n "$DEB" ]; then
            cp $DEB release-artifacts/
          fi
          # AppImage — rename to the arch-qualified name the updater expects
          # (bundle_asset_name → `Nebo-{ver}-{arch}.AppImage`).
          APPIMAGE=$(ls target/release/bundle/appimage/*.AppImage 2>/dev/null | head -n1 || true)
          if [ -n "$APPIMAGE" ]; then
            cp "$APPIMAGE" "release-artifacts/Nebo-${PKG_VERSION}-${{ matrix.arch }}.AppImage"
          else
            echo "WARNING: no AppImage produced — Linux desktop auto-update asset will be missing"
          fi

      - uses: actions/cache/save@v4
        with:
          key: release-${{ github.run_id }}-linux-${{ matrix.arch }}
          path: release-artifacts/

  # ─── Windows desktop build (Tauri 2 — WebView2) ──────────────────────
  # Gated behind a repo variable while we work through cross-platform
  # signing issues. Set `WINDOWS_BUILD_ENABLED=true` in repo Variables to
  # turn this matrix back on; `release` already tolerates a missing
  # Windows artifact via `fail-on-cache-miss: false`.
  build-windows:
    if: vars.WINDOWS_BUILD_ENABLED == 'true'
    runs-on: windows-latest
    env:
      HAS_CDN_URL: ${{ secrets.NEBOAI_CDN_URL != '' && 'true' || 'false' }}
      RUSTC_WRAPPER: ""
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          key: windows
          cache-on-failure: true

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Build frontend
        shell: bash
        run: |
          npm install -g pnpm@10.33.2
          cd app
          pnpm install --frozen-lockfile
          pnpm exec svelte-kit sync
          pnpm run build

      - name: Install protobuf compiler
        run: choco install protoc -y --no-progress

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Prepare bundled .napp files
        if: ${{ env.HAS_CDN_URL == 'true' }}
        shell: bash
        env:
          NEBOAI_CDN_URL: ${{ secrets.NEBOAI_CDN_URL }}
        run: |
          mkdir -p src-tauri/bundled-napps/{skills,agents,plugins}
          PLATFORM="windows-amd64"
          echo "Downloading bundled .napp files for $PLATFORM..."
          if [ -f "src-tauri/bundled-napps/plugins/.manifest" ]; then
            while read -r slug; do
              url="${NEBOAI_CDN_URL}/plugins/${slug}/${PLATFORM}.napp"
              curl -sSfL -o "src-tauri/bundled-napps/plugins/${slug}.napp" "$url" || echo "  SKIP $slug"
            done < "src-tauri/bundled-napps/plugins/.manifest"
          fi

      - name: Build & stage Obscura sidecars (from fork)
        shell: bash
        run: |
          TRIPLE="$(rustc -vV | sed -n 's/^host: //p')"
          git clone --depth 1 --branch "$OBSCURA_REF" "$OBSCURA_FORK" obscura-src
          ( cd obscura-src && cargo build --release -p obscura-cli )
          mkdir -p src-tauri/binaries
          for bin in obscura obscura-worker; do
            cp "obscura-src/target/release/${bin}.exe" "src-tauri/binaries/${bin}-${TRIPLE}.exe"
          done
          ls -la src-tauri/binaries

      # Sign the Obscura sidecars BEFORE bundling — they get compressed INTO the
      # NSIS installer, so they cannot be signed afterward (the sign-windows job
      # only reaches the top-level installer + nebo.exe). Unsigned sidecars trip
      # SmartScreen/Defender when extracted and run. This mirrors the macOS
      # inside-out signing of the nested obscura/obscura-worker Mach-O executables.
      - name: Sign Obscura sidecars (Authenticode)
        if: vars.AZURE_SIGNING_ENABLED == 'true'
        uses: azure/trusted-signing-action@v1
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ vars.AZURE_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ vars.AZURE_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ vars.AZURE_SIGNING_PROFILE }}
          files-folder: ${{ github.workspace }}/src-tauri/binaries
          files-folder-filter: exe
          files-folder-depth: 1
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Build Tauri desktop app
        run: cargo tauri build --bundles nsis

      - name: Extract binary and installer
        shell: bash
        run: |
          PKG_VERSION="${GITHUB_REF_NAME#v}"
          cp target/release/nebo.exe "nebo-windows-amd64.exe"
          NSIS=$(ls target/release/bundle/nsis/*.exe 2>/dev/null || true)
          if [ -n "$NSIS" ]; then
            cp $NSIS "Nebo-${PKG_VERSION}-setup.exe"
          else
            echo "::warning::No NSIS installer found"
          fi

      - name: Stage release artifacts
        shell: bash
        run: |
          mkdir -p release-artifacts
          cp nebo-windows-amd64.exe release-artifacts/ 2>/dev/null || true
          cp Nebo-*-setup.exe release-artifacts/ 2>/dev/null || true

      - uses: actions/cache/save@v4
        with:
          key: release-${{ github.run_id }}-windows-amd64
          path: release-artifacts/

  # ─── Sign Windows binaries (Azure Trusted Signing) ───────────────────
  sign-windows:
    needs: build-windows
    if: vars.WINDOWS_BUILD_ENABLED == 'true' && vars.AZURE_SIGNING_ENABLED == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows artifacts
        uses: actions/cache/restore@v4
        with:
          key: release-${{ github.run_id }}-windows-amd64
          path: release-artifacts/
          fail-on-cache-miss: true

      - name: Stage for signing
        shell: bash
        run: |
          cp release-artifacts/* . 2>/dev/null || true
          rm -rf release-artifacts

      - name: Sign binaries (Authenticode)
        uses: azure/trusted-signing-action@v1
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ vars.AZURE_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ vars.AZURE_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ vars.AZURE_SIGNING_PROFILE }}
          files-folder: ${{ github.workspace }}
          files-folder-filter: exe,msi
          files-folder-depth: 1
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Save signed artifacts
        shell: bash
        run: |
          mkdir -p signed-artifacts
          cp nebo-windows-amd64.exe signed-artifacts/ 2>/dev/null || true
          cp Nebo-*-setup.exe signed-artifacts/ 2>/dev/null || true

      - uses: actions/cache/save@v4
        with:
          key: release-${{ github.run_id }}-windows-signed
          path: signed-artifacts/

  # ─── Create GitHub release with all artifacts ─────────────────────────
  # Windows jobs (build-windows, sign-windows) are intentionally NOT in
  # `needs:` — they're gated by `WINDOWS_BUILD_ENABLED` and the release
  # step gracefully omits Windows assets when the cache restore misses.
  release:
    needs: [build-linux]
    # Linux is the required gate. macOS assets are built and published LOCALLY
    # (see `make release-macos` / `make publish-macos`) so they are intentionally
    # not a dependency here; the macOS-restore steps below are best-effort and
    # no-op when CI didn't build mac (BUILD_MACOS_IN_CI unset). Windows is
    # optional too. `success()` runs only when every job in `needs` succeeded.
    if: ${{ success() }}
    runs-on: ubuntu-latest
    env:
      DO_SPACES_KEY_SET: ${{ secrets.DO_SPACES_ACCESS_KEY != '' && 'true' || 'false' }}
    steps:
      - uses: actions/checkout@v4

      - name: Restore macOS artifacts
        run: mkdir -p artifacts

      - uses: actions/cache/restore@v4
        with:
          key: release-${{ github.run_id }}-nebo-darwin-arm64-binary
          path: nebo-darwin-arm64
          fail-on-cache-miss: false
      - run: cp nebo-darwin-arm64 artifacts/ 2>/dev/null || true

      - uses: actions/cache/restore@v4
        with:
          key: release-${{ github.run_id }}-nebo-darwin-arm64-dmg
          path: dist/
          fail-on-cache-miss: false
      - run: cp dist/Nebo-*.dmg artifacts/ 2>/dev/null || true; rm -rf dist

      - name: Restore Linux artifacts
        uses: actions/cache/restore@v4
        with:
          key: release-${{ github.run_id }}-linux-amd64
          path: release-artifacts/
          fail-on-cache-miss: false
      - run: cp release-artifacts/* artifacts/ 2>/dev/null || true; rm -rf release-artifacts

      - uses: actions/cache/restore@v4
        with:
          key: release-${{ github.run_id }}-linux-arm64
          path: release-artifacts/
          fail-on-cache-miss: false
      - run: cp release-artifacts/* artifacts/ 2>/dev/null || true; rm -rf release-artifacts

      - name: Restore Windows artifacts (prefer signed)
        uses: actions/cache/restore@v4
        with:
          key: release-${{ github.run_id }}-windows-signed
          path: signed-artifacts/
          fail-on-cache-miss: false
      - run: cp signed-artifacts/* artifacts/ 2>/dev/null || true; rm -rf signed-artifacts

      - name: Restore unsigned Windows (fallback)
        uses: actions/cache/restore@v4
        with:
          key: release-${{ github.run_id }}-windows-amd64
          path: release-artifacts/
          fail-on-cache-miss: false
      - run: |
          # Only copy unsigned if signed versions don't exist
          for f in release-artifacts/*; do
            [ -f "$f" ] || continue
            dest="artifacts/$(basename "$f")"
            [ -f "$dest" ] || cp "$f" "$dest"
          done
          rm -rf release-artifacts

      - name: List artifacts
        run: ls -la artifacts/ 2>/dev/null || echo "No artifacts"

      - name: Make binaries executable
        run: chmod +x artifacts/nebo-* 2>/dev/null || true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum \
            nebo-darwin-arm64 \
            nebo-linux-amd64 nebo-linux-arm64 \
            nebo-linux-amd64-headless nebo-linux-arm64-headless \
            nebo-windows-amd64.exe Nebo-*-setup.exe \
            Nebo-*.AppImage \
            *.deb \
            Nebo-*.dmg 2>/dev/null | tee checksums.txt
          echo "Generated checksums:"
          cat checksums.txt

      - name: Upload release assets to CDN
        if: ${{ env.DO_SPACES_KEY_SET == 'true' }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.DO_SPACES_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.DO_SPACES_SECRET_KEY }}
          S3_ENDPOINT: https://nyc3.digitaloceanspaces.com
          TAG: ${{ github.ref_name }}
        run: |
          # Generate version.json
          cat > version.json << EOFJ
          {
            "version": "${TAG}",
            "release_url": "https://github.com/NeboLoop/nebo/releases/tag/${TAG}",
            "published_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOFJ
          sed -i 's/^          //' version.json

          # Upload latest version pointer
          aws s3 cp version.json s3://neboloop/releases/version.json \
            --endpoint-url "$S3_ENDPOINT" --acl public-read --content-type application/json

          # Upload all release assets under releases/{tag}/
          for f in artifacts/nebo-* artifacts/Nebo-* artifacts/*.deb artifacts/checksums.txt; do
            [ -f "$f" ] || continue
            name=$(basename "$f")
            case "$name" in *-signed*) continue ;; esac
            aws s3 cp "$f" "s3://neboloop/releases/${TAG}/${name}" \
              --endpoint-url "$S3_ENDPOINT" --acl public-read
          done

          # Upload per-tag version.json
          aws s3 cp version.json "s3://neboloop/releases/${TAG}/version.json" \
            --endpoint-url "$S3_ENDPOINT" --acl public-read --content-type application/json
          echo "Uploaded release assets to CDN: releases/${TAG}/"

      - name: Remove intermediate signed artifacts
        run: rm -f artifacts/*-signed*

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── Update Homebrew cask (cross-repo) ────────────────────────────────
  update-homebrew:
    if: ${{ vars.HAS_TAP_TOKEN == 'true' }}
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Restore macOS DMGs
        run: mkdir -p artifacts

      - uses: actions/cache/restore@v4
        with:
          key: release-${{ github.run_id }}-nebo-darwin-arm64-dmg
          path: dist/
          fail-on-cache-miss: true
      - run: cp dist/Nebo-*.dmg artifacts/ 2>/dev/null || true; rm -rf dist

      - name: Compute SHA256 checksums
        id: checksums
        run: |
          echo "darwin_arm64=$(sha256sum artifacts/Nebo-*-arm64.dmg | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: neboloop/homebrew-tap
          token: ${{ secrets.TAP_GITHUB_TOKEN }}
          path: homebrew-tap

      - name: Checkout source (for cask template)
        uses: actions/checkout@v4
        with:
          path: source

      - name: Update cask
        env:
          VERSION: ${{ github.ref_name }}
          SHA_DARWIN_ARM64: ${{ steps.checksums.outputs.darwin_arm64 }}
        run: |
          export PKG_VERSION="${VERSION#v}"
          mkdir -p homebrew-tap/Casks
          envsubst < source/scripts/nebo.rb.tmpl > homebrew-tap/Casks/nebo.rb

      - name: Push cask update
        working-directory: homebrew-tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/nebo.rb
          git rm -f Formula/nebo.rb 2>/dev/null || true
          git commit -m "Update nebo to ${{ github.ref_name }}"
          git push

  # ─── Update APT repository (cross-repo) ──────────────────────────────
  update-apt:
    if: ${{ vars.HAS_TAP_TOKEN == 'true' }}
    needs: build-linux
    runs-on: ubuntu-latest
    env:
      HAS_GPG_KEY: ${{ secrets.APT_GPG_PRIVATE_KEY != '' && 'true' || 'false' }}
    steps:
      - name: Restore Linux artifacts (amd64)
        uses: actions/cache/restore@v4
        with:
          key: release-${{ github.run_id }}-linux-amd64
          path: release-artifacts/
          fail-on-cache-miss: true
      - run: mkdir -p debs && cp release-artifacts/*.deb debs/ 2>/dev/null || true; rm -rf release-artifacts

      - name: Restore Linux artifacts (arm64)
        uses: actions/cache/restore@v4
        with:
          key: release-${{ github.run_id }}-linux-arm64
          path: release-artifacts/
          fail-on-cache-miss: true
      - run: cp release-artifacts/*.deb debs/ 2>/dev/null || true; rm -rf release-artifacts

      - name: Checkout apt repo
        uses: actions/checkout@v4
        with:
          repository: neboloop/apt
          token: ${{ secrets.TAP_GITHUB_TOKEN }}
          path: apt-repo

      - name: Install APT repo tools
        run: sudo apt-get install -y dpkg-dev

      - name: Update APT repository
        run: |
          mkdir -p apt-repo/pool/main
          cp debs/*.deb apt-repo/pool/main/

          cd apt-repo

          # Generate Packages index
          mkdir -p dists/stable/main/binary-amd64
          mkdir -p dists/stable/main/binary-arm64

          dpkg-scanpackages pool/main /dev/null > dists/stable/main/binary-amd64/Packages
          dpkg-scanpackages pool/main /dev/null > dists/stable/main/binary-arm64/Packages
          gzip -kf dists/stable/main/binary-amd64/Packages
          gzip -kf dists/stable/main/binary-arm64/Packages

          # Generate Release file
          cat > dists/stable/Release << 'EOF'
          Origin: Nebo
          Label: Nebo
          Suite: stable
          Codename: stable
          Architectures: amd64 arm64
          Components: main
          Description: Nebo AI Agent
          EOF
          sed -i 's/^          //' dists/stable/Release

          apt-ftparchive release dists/stable >> dists/stable/Release

      - name: Sign APT repository
        if: ${{ env.HAS_GPG_KEY == 'true' }}
        env:
          GPG_KEY: ${{ secrets.APT_GPG_PRIVATE_KEY }}
        run: |
          echo "$GPG_KEY" | gpg --import
          gpg --armor --export > apt-repo/key.gpg
          gpg --default-key nebo -abs -o apt-repo/dists/stable/Release.gpg apt-repo/dists/stable/Release
          gpg --default-key nebo --clearsign -o apt-repo/dists/stable/InRelease apt-repo/dists/stable/Release

      - name: Push APT repo update
        working-directory: apt-repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Update nebo to ${{ github.ref_name }}" || echo "No changes"
          git push
