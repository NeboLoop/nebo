name: nebo-server-image

# Builds the headless Nebo server image (amd64) for the SaaS/cluster deploy and
# pushes it to GHCR. Frontend is built on the runner (pinned pnpm 10, matching
# release.yml) and embedded via rust-embed; the Rust binary compiles in Docker.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'crates/**'
      - 'app/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'Dockerfile'
      - '.github/workflows/server-image.yml'

jobs:
  build:
    runs-on: ubuntu-latest   # native amd64 — matches the DOKS node arch
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      # Reclaim ~20GB so the Rust + whisper.cpp build has room.
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force || true

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build frontend (embedded by rust-embed)
        working-directory: app
        run: |
          npm install -g pnpm@10.33.2
          pnpm install --frozen-lockfile
          pnpm exec svelte-kit sync
          pnpm run build

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/nebo:latest
            ghcr.io/${{ github.repository_owner }}/nebo:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
