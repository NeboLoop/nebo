id: search-consumes-results
name: "Web search — consume results, no re-search treadmill"
description: |
  A current-fact question (pricing) that must be answered from the web. The
  2026-07-09 incident: the agent fired 14+ web(search) calls with varied queries,
  never read a result page, and never answered — because every search tier
  returned results with EMPTY snippets (bare title+URL lists), so there was
  nothing to consume and the model kept re-querying.

  Fixed by making the search contract honest: every tier populates snippets
  (extract_search_links captures description text + DDG's duplicate-href snippet
  anchors), and when no preview text exists the payload says so explicitly and
  points at read_page. This fixture guards the behavior, whatever the future
  cause: search → consume (answer from snippets or read a page) — never
  search → search → search.
target_component: agent

conversation:
  - role: user
    content: "What does ChatGPT 5.6 cost per million input and output tokens? Give me the current prices."

tool_config:
  web:
    enabled: true

prompt_assertions:
  first_call:
    - id: searches-first
      text: "Model starts with a web search (resource: search) for the pricing"
      severity: important
  recovery:
    - id: consumes-results
      text: "After a search returns results, the model either answers using the result snippets OR calls web read_page/fetch on a result URL — it does NOT issue another search without consuming the previous results"
      severity: critical
    - id: no-treadmill
      text: "Model performs at most 3 web searches total for this single-fact question"
      severity: critical
    - id: grounded-answer
      text: "The final answer states concrete prices taken from the search results or a fetched page (not hedged 'I couldn't find it' after successful searches)"
      severity: important
  cost:
    - id: efficient
      text: "Task completes in 1-4 tool calls"
      severity: important

ideal_behavior:
  tool_calls: 2
  total_tokens: 3000
  narrative: |
    The agent searches once, reads the pricing from the result snippets (or makes
    one read_page call on the most authoritative result), and answers with the
    concrete numbers. If results genuinely lack preview text, the payload now says
    so explicitly and the agent's next call is read_page on a result URL — never
    another search with a reworded query.
