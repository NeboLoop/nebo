id: naming-grep-file
name: "Naming test — search file contents"
description: |
  Baseline task: search for a pattern in files. Measures first-call tool naming accuracy.
target_component: os

conversation:
  - role: user
    content: "Search for the word 'TODO' in all files under /tmp/nebo-project/"

prompt_assertions:
  first_call:
    - id: calls-any-grep
      text: "Model's first call searches file contents — either os(resource: 'file', action: 'grep') or grep(regex: '...') depending on convention"
      severity: critical
    - id: correct-pattern
      text: "Model passes regex/pattern containing 'TODO'"
      severity: critical
    - id: not-glob
      text: "Model does NOT use glob/find (which matches filenames, not contents)"
      severity: important
  cost:
    - id: single-call
      text: "Task completes in 1 tool call"
      severity: important

ideal_behavior:
  tool_calls: 1
  total_tokens: 1500
